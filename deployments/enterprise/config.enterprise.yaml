# config.enterprise.yaml — 企业模式配置

openagents_stack:
  backend_port: 8000
  bind_address: "127.0.0.1"

https:
  enabled: true
  domain: "openagents.company.com"
  cert_file: "/etc/ssl/certs/openagents.crt"
  key_file: "/etc/ssl/private/openagents.key"

auth:
  type: oauth2
  oauth2:
    provider: "https://login.company.com"
    client_id: "openagents-stack"
    client_secret: "***"
    scopes: ["openid", "profile", "email"]

tenants:
  - name: "engineering"
    workspace: eng-shared
    members: ["alice@company.com"]

ha:
  enabled: false

monitoring:
  prometheus: {enabled: false}
  grafana: {enabled: false}

backup:
  enabled: false
