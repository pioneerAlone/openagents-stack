name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits since last tag
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "## Changes since $PREV_TAG"
            echo ""
            git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges
          } > CHANGELOG.tmp

      - name: Bundle examples + deployments as tarballs
        # Pack the many small example/deployment files into a single
        # tarball so the GitHub release page isn't flooded with 60+
        # individual assets. Users `tar xzf` into their install.
        run: |
          tar czf examples.tar.gz examples/
          tar czf deployments.tar.gz deployments/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.tmp
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            # Entrypoint + user-facing installer
            install.sh
            config.example.yaml
            # Stack core (binary + libs + macOS platform support)
            bin/openagents-stack
            lib/*.sh
            lib/versions.lock
            platform/macos/*.sh
            # Documentation
            README.md
            LICENSE
            docs/architecture.md
            docs/quickstart.md
            docs/openagents-overview.md
            docs/deployment/*.md
            # Examples + deployments (bundled as tarballs — many small files)
            examples.tar.gz
            deployments.tar.gz
